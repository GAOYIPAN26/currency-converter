<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Currency Converter 2026</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f7f7f7;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #222;
    }

    .converter {
      width: 780px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 36px 44px 34px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.04);
    }

    h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin-top: 10px;
      color: #777;
      font-size: 15px;
      line-height: 1.5;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 34px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: #555;
      font-size: 15px;
      font-weight: 600;
    }

    .input-box,
    .select-box {
      display: flex;
      height: 54px;
      border: 1px solid #cfcfcf;
      border-radius: 7px;
      overflow: hidden;
      background: #fff;
    }

    .prefix {
      width: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      border-right: 1px solid #d8d8d8;
      color: #555;
      font-size: 18px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      border: 0;
      outline: 0;
      padding: 0 16px;
      font-size: 21px;
      color: #111;
      background: transparent;
      font-family: inherit;
    }

    select {
      cursor: pointer;
      appearance: none;
    }

    .swap-row {
      display: flex;
      justify-content: center;
      margin: 24px 0 4px;
    }

    .swap-button {
      border: 1px solid #d0d0d0;
      border-radius: 999px;
      background: #fff;
      color: #333;
      padding: 10px 22px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .swap-button:hover {
      background: #f3f3f3;
    }

    .result-card {
      margin-top: 26px;
      border-radius: 12px;
      background: #fafafa;
      padding: 26px 28px;
      text-align: center;
    }

    .result-label {
      color: #555;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .result-value {
      font-size: 42px;
      font-weight: 800;
      color: #4f8f38;
      letter-spacing: 0.4px;
      word-break: break-word;
    }

    .rate-line {
      margin-top: 12px;
      color: #777;
      font-size: 15px;
    }

    .divider {
      height: 1px;
      background: #e5e5e5;
      margin: 28px 0 24px;
    }

    .rate-title {
      font-size: 16px;
      font-weight: 700;
      color: #333;
      margin-bottom: 14px;
    }

    .rate-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .rate-card {
      min-height: 96px;
      border-radius: 8px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 16px 10px;
      text-align: center;
    }

    .rate-name {
      color: #555;
      font-size: 14px;
      line-height: 1.35;
    }

    .rate-value {
      margin-top: 9px;
      color: #111;
      font-size: 21px;
      font-weight: 700;
    }

    .quick-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .quick-button {
      border: 1px solid #d0d0d0;
      border-radius: 999px;
      background: #fff;
      color: #333;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .quick-button:hover {
      background: #f3f3f3;
    }

    .note {
      margin-top: 16px;
      color: #888;
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 820px) {
      body {
        align-items: flex-start;
        padding: 18px;
      }

      .converter {
        width: 100%;
        padding: 28px 22px;
      }

      .main-grid,
      .rate-cards {
        grid-template-columns: 1fr;
      }

      .result-value {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <main class="converter">
    <h1>汇率转换器 Currency Converter</h1>
    <div class="subtitle">人民币 CNY ｜ 新币 SGD ｜ 美元 USD<br />汇率参考：2026 管报汇率</div>

    <section class="main-grid">
      <div>
        <label for="amount">金额 Amount</label>
        <div class="input-box">
          <div class="prefix" id="amountPrefix">¥</div>
          <input id="amount" type="number" value="100" min="0" step="0.01" />
        </div>
      </div>

      <div>
        <label for="fromCurrency">从 From</label>
        <div class="select-box">
          <div class="prefix">From</div>
          <select id="fromCurrency">
            <option value="CNY">人民币 CNY</option>
            <option value="SGD">新币 SGD</option>
            <option value="USD">美元 USD</option>
          </select>
        </div>
      </div>
    </section>

    <section class="main-grid">
      <div>
        <label for="toCurrency">转换到 To</label>
        <div class="select-box">
          <div class="prefix">To</div>
          <select id="toCurrency">
            <option value="SGD">新币 SGD</option>
            <option value="CNY">人民币 CNY</option>
            <option value="USD">美元 USD</option>
          </select>
        </div>
      </div>

      <div>
        <label>快捷切换 Quick Convert</label>
        <div class="quick-row">
          <button class="quick-button" data-from="CNY" data-to="SGD">CNY → SGD</button>
          <button class="quick-button" data-from="SGD" data-to="CNY">SGD → CNY</button>
          <button class="quick-button" data-from="CNY" data-to="USD">CNY → USD</button>
          <button class="quick-button" data-from="USD" data-to="CNY">USD → CNY</button>
          <button class="quick-button" data-from="SGD" data-to="USD">SGD → USD</button>
          <button class="quick-button" data-from="USD" data-to="SGD">USD → SGD</button>
        </div>
      </div>
    </section>

    <div class="swap-row">
      <button class="swap-button" id="swapButton">⇄ Swap currency</button>
    </div>

    <section class="result-card">
      <div class="result-label" id="resultLabel">100 人民币 CNY =</div>
      <div class="result-value" id="resultValue">S$18.35</div>
      <div class="rate-line" id="rateLine">1 CNY = 0.1835 SGD</div>
    </section>

    <div class="divider"></div>

    <section>
      <div class="rate-title">2026 汇率参考 Reference Rates</div>
      <div class="rate-cards">
        <div class="rate-card">
          <div class="rate-name">人民币 → 美元<br />1 CNY =</div>
          <div class="rate-value">US$0.142749</div>
        </div>
        <div class="rate-card">
          <div class="rate-name">新币 → 美元<br />1 SGD =</div>
          <div class="rate-value">US$0.777847</div>
        </div>
        <div class="rate-card">
          <div class="rate-name">新币 → 人民币<br />1 SGD =</div>
          <div class="rate-value">¥5.449054</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const ratesToUSD = {
      CNY: 0.142749,
      SGD: 0.777847,
      USD: 1
    };

    const currencyInfo = {
      CNY: { name: "人民币 CNY", symbol: "¥", decimals: 2 },
      SGD: { name: "新币 SGD", symbol: "S$", decimals: 2 },
      USD: { name: "美元 USD", symbol: "US$", decimals: 2 }
    };

    const amountInput = document.getElementById("amount");
    const fromCurrency = document.getElementById("fromCurrency");
    const toCurrency = document.getElementById("toCurrency");
    const amountPrefix = document.getElementById("amountPrefix");
    const resultLabel = document.getElementById("resultLabel");
    const resultValue = document.getElementById("resultValue");
    const rateLine = document.getElementById("rateLine");
    const swapButton = document.getElementById("swapButton");
    const quickButtons = document.querySelectorAll(".quick-button");

    function convertAmount(amount, from, to) {
      const amountInUSD = amount * ratesToUSD[from];
      return amountInUSD / ratesToUSD[to];
    }

    function formatCurrency(value, code) {
      const info = currencyInfo[code];
      if (!Number.isFinite(value)) value = 0;
      return `${info.symbol}${value.toFixed(info.decimals)}`;
    }

    function formatRate(value) {
      if (!Number.isFinite(value)) value = 0;
      if (value >= 1) return value.toFixed(6).replace(/0+$/, "").replace(/\.$/, "");
      return value.toFixed(6).replace(/0+$/, "").replace(/\.$/, "");
    }

    function calculate() {
      const amount = Number(amountInput.value) || 0;
      const from = fromCurrency.value;
      const to = toCurrency.value;
      const converted = convertAmount(amount, from, to);
      const oneUnitRate = convertAmount(1, from, to);

      amountPrefix.textContent = currencyInfo[from].symbol;
      resultLabel.textContent = `${amount} ${currencyInfo[from].name} =`;
      resultValue.textContent = formatCurrency(converted, to);
      rateLine.textContent = `1 ${from} = ${formatRate(oneUnitRate)} ${to}`;
    }

    amountInput.addEventListener("input", calculate);
    fromCurrency.addEventListener("change", calculate);
    toCurrency.addEventListener("change", calculate);

    swapButton.addEventListener("click", () => {
      const oldFrom = fromCurrency.value;
      fromCurrency.value = toCurrency.value;
      toCurrency.value = oldFrom;
      calculate();
    });

    quickButtons.forEach((button) => {
      button.addEventListener("click", () => {
        fromCurrency.value = button.dataset.from;
        toCurrency.value = button.dataset.to;
        calculate();
      });
    });

    calculate();
  </script>
</body>
</html>
